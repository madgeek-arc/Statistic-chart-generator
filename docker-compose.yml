services:

  stats-app:
    image: docker-registry.openaire.eu/stats-tool/statistic-chart-generator:21
    pull_policy: always
    ports:
      - "8090:8090"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./config:/usr/local/app/config:ro
      - ./logs:/usr/local/app/logs
      - hsqldb-cache:/tmp/cache
    restart: unless-stopped

volumes:
  hsqldb-cache:
