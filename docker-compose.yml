services:

  stats-app:
    image: docker-registry.openaire.eu/stats-tool/statistic-chart-generator:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config:/usr/local/app/config:ro
      - logs:/usr/local/app/logs
      - hsqldb-cache:/tmp/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitor}
      POSTGRES_USER: ${POSTGRES_USER:-dnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dnetPwd}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dnet} -d ${POSTGRES_DB:-monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redisPassword}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisPassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  logs:
  hsqldb-cache:
  postgres-data:
  redis-data:
